<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<style>
body{font-family:Poppins;background:#ffb6d9;color:white;}
nav a{color:white;margin:10px;text-decoration:none;}
table{width:80%;margin:auto;background:#ff69b4;}
</style>
</head>
<body>

<nav>
<a href="/">Home</a>
<a href="/products/">Products</a>
<a href="/cart/">Cart</a>
</nav>

<h1>Your Cake Box 🎂</h1>

<table>
<tr><th>Name</th><th>Price</th><th>Action</th></tr>
{% for p in products %}
<tr>
<td>{{p.name}}</td>
<td>${{p.price}}</td>
<td><a href="/remove/{{p.id}}/">Remove</a></td>
</tr>
{% endfor %}
</table>

<h2>Total: ${{total}}</h2>

<a href="/checkout/"><button>Checkout</button></a>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>All Cakes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>
body {font-family:Poppins;background:#ffb6d9;color:white;}
nav a {color:white;margin:10px;text-decoration:none;}
.grid {display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.card {background:#ff69b4;padding:10px;text-align:center;}
button {background:white;color:#ff69b4;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
<a href="/">Home</a>
<a href="/products/">Products</a>
<a href="/cart/">Cart</a>
</nav>

<h1>All Cakes 🍰</h1>

<div class="grid">
{% for p in products %}
<div class="card">
<img src="{{p.image_url}}" width="150">
<h3>{{p.name}}</h3>
<p>${{p.price}}</p>
<a href="/add/{{p.id}}/"><button>Add</button></a>
</div>
{% endfor %}
</div>

</body>
</html>

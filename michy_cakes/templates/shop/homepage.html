<!DOCTYPE html>
<html>
<head>
<title>michy cakes and pastry</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>
body {font-family:Poppins;background:#ffb6d9;color:white;margin:0;}
nav {padding:15px;background:#ff69b4;}
nav a {color:white;margin:10px;text-decoration:none;}
.hero {text-align:center;padding:50px;}
button {background:white;color:#ff69b4;padding:10px;border:none;}
</style>
</head>
<body>

<nav>
<a href="/">Home</a>
<a href="/products/">Products</a>
<a href="/cart/">Cart</a>
</nav>

<div class="hero">
<h1>michy cakes and pastry</h1>
<p>Fresh cakes made with love 🍰</p>
<img src="https://i.pinimg.com/736x/9d/86/9c/9d869c82a2eb38f76ec9d10dc088f103.jpg" alt="Fresh cakes" style="max-width:500px;margin-top:20px;">
</div>

<div style="display:flex;justify-content:center;gap:20px;">
{% for p in products %}
{% if p.name == "Black Forest Cake" %}
<div>
<img src="{{p.image_url}}" width="200">
<h3>{{p.name}}</h3>
</div>
{% endif %}
{% endfor %}
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>S.I.C Classic Cake Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>
body {font-family:Poppins;background:#1a2a4f;color:white;margin:0;}
nav {padding:15px;background:#0f1a33;}
nav a {color:#c9a03d;margin:10px;text-decoration:none;}
.hero {text-align:center;padding:50px;}
button {background:#c9a03d;color:#1a2a4f;padding:10px;border:none;}
</style>
</head>
<body>

<nav>
<a href="/">Home</a>
<a href="/products/">Products</a>
<a href="/cart/">Cart</a>
</nav>

<div class="hero">
<h1>S.I.C Classic Cake Shop</h1>
<p>Fresh cakes made with love 🍰</p>
</div>

<div style="display:flex;justify-content:center;gap:20px;">
{% for p in products %}
<div>
<img src="{{p.image_url}}" width="200">
<h3>{{p.name}}</h3>
<p>${{p.price}}</p>
<a href="/add/{{p.id}}/"><button>Add</button></a>
</div>
{% endfor %}
</div>

</body>
</html>
